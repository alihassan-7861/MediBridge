{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Medibridge{% endblock %}</title>

    <!-- Bootstrap 5.3.3 CSS — only one version -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Global CSS — loads on every page -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}" />
    <link rel="stylesheet" href="{% static 'css/footer.css' %}" />

    <!-- Page specific CSS — each page adds its own -->
    {% block extra_css %}{% endblock %}
  </head>

  <body>

    <!-- Navbar -->
    {% include 'Medibridge/partials/navbar.html' %}

    <!-- Page Content -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    {% include 'Medibridge/partials/footer.html' %}

    <!-- Bootstrap 5 JS — only one version, correct one -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>

    <!-- Page specific JS — each page adds its own -->
    {% block extra_js %}{% endblock %}

  </body>
</html>
